<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>中醫全科理療師 題庫</title>
<style>
  :root {
    --red:    #c0392b;
    --green:  #27ae60;
    --blue:   #2980b9;
    --gold:   #d4a017;
    --bg:     #fdf6ec;
    --card:   #ffffff;
    --border: #e8d5b0;
    --text:   #2c1810;
    --muted:  #7f6650;
    --accent: #8b1a1a;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #8b1a1a 0%, #c0392b 60%, #d4a017 100%);
    color: #fff;
    padding: 18px 20px 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 3px 16px rgba(139,26,26,.35);
  }
  header h1 {
    font-size: 20px; font-weight: 700; letter-spacing: 1px;
    display: flex; align-items: center; gap: 8px;
  }
  header h1 span.icon { font-size: 24px; }
  #total-badge {
    margin-top: 6px;
    font-size: 13px; opacity: .85;
  }
  #total-badge b { font-size: 15px; color: #ffe082; }

  /* ── Search bar ── */
  .search-wrap {
    padding: 14px 16px 8px;
    background: var(--bg);
    position: sticky; top: 74px; z-index: 90;
    border-bottom: 1px solid var(--border);
  }
  .search-row {
    display: flex; gap: 8px;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px 6px 10px;
    align-items: center;
    box-shadow: var(--shadow);
  }
  .search-row .icon { font-size: 20px; color: var(--muted); }
  #searchInput {
    flex: 1; border: none; outline: none; background: none;
    font-size: 17px; color: var(--text);
    padding: 4px 0;
  }
  #clearBtn {
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--muted); padding: 0 2px;
    display: none;
  }

  /* ── Filter pills ── */
  .filter-wrap {
    padding: 10px 16px 6px;
    background: var(--bg);
    position: sticky; top: 145px; z-index: 89;
    border-bottom: 1px solid var(--border);
  }
  .filter-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: .5px; }
  .pills {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .pill {
    padding: 6px 14px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 14px; color: var(--muted);
    cursor: pointer; white-space: nowrap;
    transition: all .18s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .pill.active { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 600; }
  .pill.type-单.active  { background: var(--blue);  border-color: var(--blue); }
  .pill.type-多.active  { background: var(--green); border-color: var(--green); }
  .pill.type-判.active  { background: var(--gold);  border-color: var(--gold); color: #2c1810; }

  .divider { height: 1px; background: var(--border); margin: 8px 0 6px; }

  /* ── Results area ── */
  #results {
    padding: 12px 14px 40px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* ── Empty state ── */
  #emptyState {
    text-align: center; padding: 60px 20px; color: var(--muted);
    display: none;
  }
  #emptyState .big { font-size: 52px; margin-bottom: 14px; }
  #emptyState p { font-size: 16px; }

  /* ── Question card ── */
  .qcard {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow .18s;
    -webkit-tap-highlight-color: transparent;
  }
  .qcard:active { box-shadow: 0 1px 4px rgba(0,0,0,.08); }

  /* card top meta bar */
  .qcard-meta {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 9px 14px 8px;
    background: #faf3e8;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .badge-num {
    background: var(--accent); color: #fff;
    font-size: 12px; font-weight: 700;
    border-radius: 8px; padding: 2px 8px;
    min-width: 38px; text-align: center;
  }
  .badge-type {
    font-size: 12px; font-weight: 700;
    border-radius: 8px; padding: 2px 8px;
    color: #fff;
  }
  .badge-type.单 { background: var(--blue); }
  .badge-type.多 { background: var(--green); }
  .badge-type.判 { background: var(--gold); color: #2c1810; }

  .badge-main {
    background: #ede0c8; color: var(--accent);
    font-size: 12px; font-weight: 600;
    border-radius: 8px; padding: 2px 9px;
  }
  .badge-sub {
    background: #e8f0e8; color: #2d6a2d;
    font-size: 11px;
    border-radius: 8px; padding: 2px 8px;
  }
  .badge-hint {
    margin-left: auto;
    background: #fff8e1; color: #7a5800;
    font-size: 11px; font-weight: 600;
    border-radius: 8px; padding: 2px 9px;
    border: 1px solid #ffe082;
    max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* question body */
  .qcard-body {
    padding: 12px 14px;
    cursor: pointer;
  }
  .qtext {
    font-size: 16px; line-height: 1.6; font-weight: 500;
    color: var(--text);
  }
  .qtext mark {
    background: #fff176; color: inherit; border-radius: 3px; padding: 0 1px;
  }

  /* expand toggle hint */
  .expand-hint {
    margin-top: 8px;
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .arrow { transition: transform .2s; display: inline-block; }
  .qcard.open .arrow { transform: rotate(180deg); }

  /* options & answer - hidden by default */
  .qcard-detail {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px dashed var(--border);
  }
  .qcard.open .qcard-detail { display: block; }

  .opts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px; margin-top: 12px;
  }
  .opts-grid.single-col { grid-template-columns: 1fr; }
  .opt-item {
    display: flex; align-items: flex-start; gap: 8px;
    background: #f7f2ea;
    border-radius: 10px; padding: 9px 12px;
    border: 1.5px solid transparent;
    font-size: 14px; line-height: 1.5;
  }
  .opt-item.correct {
    background: #e8f5e9;
    border-color: var(--green);
  }
  .opt-key {
    font-weight: 800; font-size: 15px;
    min-width: 20px; color: var(--muted);
  }
  .opt-item.correct .opt-key { color: var(--green); }
  .opt-val { color: var(--text); }

  /* answer banner */
  .ans-banner {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .ans-banner.单  { background: #e3f2fd; color: #1565c0; }
  .ans-banner.多  { background: #e8f5e9; color: #1b5e20; }
  .ans-banner.判对 { background: #e8f5e9; color: #1b5e20; }
  .ans-banner.判错 { background: #fce4ec; color: #880e4f; }
  .ans-banner .ans-icon { font-size: 20px; }

  /* scroll-to-top */
  #topBtn {
    position: fixed; bottom: 28px; right: 20px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 50%;
    width: 50px; height: 50px; font-size: 22px;
    box-shadow: 0 4px 16px rgba(139,26,26,.4);
    cursor: pointer; display: none; z-index: 200;
    -webkit-tap-highlight-color: transparent;
  }

  /* loading */
  #loading {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 16px;
  }

  @media (min-width: 768px) {
    header h1 { font-size: 24px; }
    #results { padding: 16px 20px 60px; gap: 14px; }
    .qtext { font-size: 17px; }
    .opt-item { font-size: 15px; }
  }
  @media (min-width: 1024px) {
    body { max-width: 900px; margin: 0 auto; }
    header { border-radius: 0 0 16px 16px; }
  }
</style>
</head>
<body>

<header>
  <h1><span class="icon">🏥</span>中醫全科理療師 題庫</h1>
  <div id="total-badge">共 <b id="totalCount">—</b> 題｜顯示 <b id="showCount">—</b> 題</div>
</header>

<div class="search-wrap">
  <div class="search-row">
    <span class="icon">🔍</span>
    <input id="searchInput" type="search" placeholder="搜尋題目、選項、提示字…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="clearBtn">✕</button>
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-label">題型篩選</div>
  <div class="pills" id="typePills">
    <div class="pill active" data-val="">全部</div>
    <div class="pill type-单" data-val="单">單選題</div>
    <div class="pill type-多" data-val="多">多選題</div>
    <div class="pill type-判" data-val="判">判斷題</div>
  </div>
  <div class="divider"></div>
  <div class="filter-label">主分類篩選</div>
  <div class="pills" id="mainPills">
    <div class="pill active" data-val="">全部</div>
  </div>
</div>

<div id="results">
  <div id="loading">⏳ 載入題目中…</div>
  <div id="emptyState">
    <div class="big">🔎</div>
    <p>找不到符合條件的題目<br>請試試其他關鍵字</p>
  </div>
</div>

<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="questions_data.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let filterType = '';
let filterMain = '';
let searchText = '';
let openCards  = new Set();

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildMainPills();
  render();

  document.getElementById('searchInput').addEventListener('input', e => {
    searchText = e.target.value.trim();
    document.getElementById('clearBtn').style.display = searchText ? 'block' : 'none';
    openCards.clear();
    render();
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    searchText = '';
    document.getElementById('clearBtn').style.display = 'none';
    openCards.clear();
    render();
  });
  window.addEventListener('scroll', () => {
    document.getElementById('topBtn').style.display = window.scrollY > 400 ? 'flex' : 'none';
  });
});

// ── Build main-category pills ───────────────────────────────────────────────
function buildMainPills() {
  const mains = [...new Set(QUESTIONS.map(q => q.main))].sort();
  const wrap = document.getElementById('mainPills');
  mains.forEach(m => {
    const p = document.createElement('div');
    p.className = 'pill';
    p.dataset.val = m;
    p.textContent = m;
    wrap.appendChild(p);
  });

  document.getElementById('typePills').addEventListener('click', e => {
    const p = e.target.closest('.pill');
    if (!p) return;
    filterType = p.dataset.val;
    document.querySelectorAll('#typePills .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    openCards.clear();
    render();
  });
  document.getElementById('mainPills').addEventListener('click', e => {
    const p = e.target.closest('.pill');
    if (!p) return;
    filterMain = p.dataset.val;
    document.querySelectorAll('#mainPills .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    openCards.clear();
    render();
  });
}

// ── Filter ─────────────────────────────────────────────────────────────────
function filtered() {
  const kw = searchText.toLowerCase();
  return QUESTIONS.filter(q => {
    if (filterType && q.type !== filterType) return false;
    if (filterMain && q.main !== filterMain) return false;
    if (!kw) return true;
    const hay = [q.q, q.hint, q.main, q.sub, q.ans, String(q.id),
                 ...Object.values(q.opts)].join(' ').toLowerCase();
    return hay.includes(kw);
  });
}

// ── Highlight ──────────────────────────────────────────────────────────────
function hl(text) {
  if (!searchText) return escHtml(text);
  const kw = searchText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(kw, 'gi'), m => `<mark>${m}</mark>`);
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const list = filtered();
  document.getElementById('totalCount').textContent = QUESTIONS.length;
  document.getElementById('showCount').textContent  = list.length;

  const results = document.getElementById('results');
  // remove old cards
  results.querySelectorAll('.qcard').forEach(c => c.remove());
  document.getElementById('loading').style.display = 'none';

  if (list.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  const frag = document.createDocumentFragment();
  list.forEach(q => frag.appendChild(buildCard(q)));
  results.appendChild(frag);
}

// ── Build card ─────────────────────────────────────────────────────────────
function buildCard(q) {
  const card = document.createElement('div');
  card.className = 'qcard' + (openCards.has(q.id) ? ' open' : '');
  card.dataset.id = q.id;

  const sub = (q.sub && q.sub !== '—') ? `<span class="badge-sub">${escHtml(q.sub)}</span>` : '';

  // Answer display
  let ansBannerHtml = '';
  let optsHtml = '';

  if (q.type === '判') {
    const cls = q.ans === '对' ? '判对' : '判错';
    const icon = q.ans === '对' ? '✅' : '❌';
    ansBannerHtml = `<div class="ans-banner ${cls}"><span class="ans-icon">${icon}</span>答案：${q.ans}</div>`;
  } else {
    // Build options
    const keys = Object.keys(q.opts);
    const longText = keys.some(k => q.opts[k].length > 14);
    const correctKeys = q.ans.split('');
    const gridClass = longText ? 'opts-grid single-col' : 'opts-grid';
    const optItems = keys.map(k => {
      const isCorrect = correctKeys.includes(k);
      return `<div class="opt-item${isCorrect ? ' correct' : ''}">
        <span class="opt-key">${k}</span>
        <span class="opt-val">${hl(q.opts[k])}</span>
      </div>`;
    }).join('');
    optsHtml = `<div class="${gridClass}">${optItems}</div>`;

    const typeCls = q.type === '多' ? '多' : '单';
    const icon = q.type === '多' ? '✅' : '🎯';
    ansBannerHtml = `<div class="ans-banner ${typeCls}"><span class="ans-icon">${icon}</span>正確答案：<b>${q.ans}</b></div>`;
  }

  card.innerHTML = `
    <div class="qcard-meta">
      <span class="badge-num">#${q.id}</span>
      <span class="badge-type ${q.type}">${q.type === '单' ? '單選' : q.type === '多' ? '多選' : '判斷'}</span>
      <span class="badge-main">${escHtml(q.main)}</span>
      ${sub}
      <span class="badge-hint">💡 ${escHtml(q.hint)}</span>
    </div>
    <div class="qcard-body">
      <div class="qtext">${hl(q.q)}</div>
      <div class="expand-hint">
        <span>點擊查看答案</span>
        <span class="arrow">▼</span>
      </div>
    </div>
    <div class="qcard-detail">
      ${optsHtml}
      ${ansBannerHtml}
    </div>`;

  // click to toggle
  card.querySelector('.qcard-meta').addEventListener('click', () => toggle(card, q.id));
  card.querySelector('.qcard-body').addEventListener('click', () => toggle(card, q.id));

  return card;
}

function toggle(card, id) {
  card.classList.toggle('open');
  if (card.classList.contains('open')) openCards.add(id);
  else openCards.delete(id);
}
</script>
</body>
</html>
